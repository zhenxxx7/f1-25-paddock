<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 25 · Paddock</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Chakra+Petch:wght@500;600;700&display=swap" />
</head>
<body>
  <div id="app">
    <div id="topbar"></div>
    <div class="wall">
      <!-- LEFT COLUMN -->
      <div class="col left">
        <div class="slot" id="tower"></div>
        <div class="slot" id="log"></div>
      </div>

      <!-- CENTER COLUMN -->
      <div class="col center-col">
        <div class="slot" id="cockpit"></div>
        <div class="slot" id="chart"></div>
        <div class="slot" id="tyres"></div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="col right">
        <div class="slot" id="map"></div>
        <div class="slot" id="ers"></div>
        <div class="slot" id="history"></div>
        <div class="slot" id="info"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
